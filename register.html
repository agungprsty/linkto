<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Linkto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            yellow: '#FFD800',
                            pink: '#FF4DF8',
                            blue: '#4D9FFF',
                            green: '#00E676',
                            bg: '#F3F3F1'
                        }
                    },
                    boxShadow: {
                        'brutal': '8px 8px 0px 0px rgba(0,0,0,1)',
                        'brutal-sm': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'brutal-hover': '2px 2px 0px 0px rgba(0,0,0,1)',
                        'brutal-lg': '12px 12px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .float-slow {
            animation: floatSlow 6s ease-in-out infinite;
        }
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        input:focus {
            border-color: #000 !important;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1) !important;
        }

        /* Strength bar */
        .strength-weak { background: #ef4444; }
        .strength-medium { background: #f59e0b; }
        .strength-strong { background: #00E676; }
    </style>
</head>
<body class="bg-brand-bg text-black antialiased overflow-x-hidden min-h-screen flex flex-col selection:bg-brand-pink selection:text-white">

    <!-- ========================================== -->
    <!-- TOP NAV (minimal)                          -->
    <!-- ========================================== -->
    <nav class="w-full bg-brand-bg border-b-4 border-black">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center -rotate-12 hover:rotate-0 transition-transform">
                        <i class="ph ph-link text-brand-yellow text-xl font-bold"></i>
                    </div>
                    <span class="font-black text-2xl tracking-tight">Linkto.</span>
                </a>
                <p class="text-sm font-bold text-gray-500 hidden sm:block">
                    Already have an account? <a href="login.html" class="text-brand-blue underline decoration-4 underline-offset-2 hover:text-black transition-colors">Log in</a>
                </p>
            </div>
        </div>
    </nav>

    <!-- ========================================== -->
    <!-- REGISTER FORM                              -->
    <!-- ========================================== -->
    <main class="flex-1 flex items-center justify-center px-4 py-12 relative overflow-hidden">
        <!-- Background decorations -->
        <div class="absolute top-20 right-10 w-40 h-40 bg-brand-green border-4 border-black rounded-full -z-0 float-slow" style="animation-delay: 1s;"></div>
        <div class="absolute bottom-20 left-10 w-32 h-32 bg-brand-yellow border-4 border-black rounded-lg -z-0 float-slow" style="animation-delay: 3s;"></div>
        <div class="absolute top-1/3 left-1/4 w-24 h-24 bg-brand-pink border-4 border-black -z-0 -rotate-12"></div>
        <div class="absolute bottom-1/3 right-1/4 w-16 h-16 bg-brand-blue border-4 border-black rounded-full -z-0"></div>

        <div class="w-full max-w-md relative z-10">
            <!-- Card -->
            <div class="bg-white border-4 border-black shadow-brutal-lg p-8 sm:p-10">
                <!-- Header -->
                <div class="text-center mb-8">
                    <h1 class="text-3xl sm:text-4xl font-black">Create your account</h1>
                    <p class="text-base font-semibold text-gray-500 mt-2">Join 10M+ creators on Linkto</p>
                </div>

                <!-- Register Form -->
                <form class="space-y-5" onsubmit="event.preventDefault(); alert('Demo: Account created!');">
                    <div>
                        <label for="email" class="block font-bold text-sm mb-2">Email address</label>
                        <input id="email" type="email" placeholder="you@example.com" required
                            class="w-full border-4 border-black py-3.5 px-4 font-semibold text-base bg-white shadow-brutal-sm focus:shadow-brutal-hover focus:translate-x-[2px] focus:translate-y-[2px] outline-none transition-all">
                    </div>

                    <div>
                        <label for="password" class="block font-bold text-sm mb-2">Password</label>
                        <input id="password" type="password" placeholder="Create a strong password" required
                            class="w-full border-4 border-black py-3.5 px-4 font-semibold text-base bg-white shadow-brutal-sm focus:shadow-brutal-hover focus:translate-x-[2px] focus:translate-y-[2px] outline-none transition-all">
                        <!-- Password strength indicator -->
                        <div class="flex gap-2 mt-3">
                            <div class="h-2 flex-1 rounded-full bg-gray-200" id="str-1"></div>
                            <div class="h-2 flex-1 rounded-full bg-gray-200" id="str-2"></div>
                            <div class="h-2 flex-1 rounded-full bg-gray-200" id="str-3"></div>
                        </div>
                        <p class="text-xs font-semibold text-gray-400 mt-2">Use at least 8 characters, one uppercase, one number & one symbol</p>
                    </div>

                    <div class="flex items-start gap-3 text-sm">
                        <input type="checkbox" required class="w-5 h-5 mt-0.5 border-4 border-black accent-black flex-shrink-0">
                        <span class="font-semibold text-gray-600">I agree to the <a href="terms.html" class="text-brand-blue font-bold underline decoration-2 underline-offset-2">Terms of Service</a> and <a href="privacy.html" class="text-brand-blue font-bold underline decoration-2 underline-offset-2">Privacy Policy</a>.</span>
                    </div>

                    <button type="submit"
                        class="w-full bg-brand-pink text-black font-black text-lg py-4 border-4 border-black shadow-brutal hover:shadow-brutal-hover hover:translate-x-[2px] hover:translate-y-[2px] transition-all rounded-full flex items-center justify-center gap-2">
                        Create Account <i class="ph ph-arrow-right font-bold"></i>
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-4 mb-6 mt-8">
                    <div class="flex-1 h-1 bg-black"></div>
                    <span class="text-sm font-bold text-gray-500">OR</span>
                    <div class="flex-1 h-1 bg-black"></div>
                </div>

                <!-- Social Signup Buttons -->
                <div class="space-y-3 mb-6">
                    <button class="w-full flex items-center justify-center gap-3 bg-white border-4 border-black shadow-brutal-sm py-3.5 font-bold text-base hover:shadow-brutal-hover hover:translate-x-[2px] hover:translate-y-[2px] transition-all rounded-full">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Sign up with Google
                    </button>
                    <button class="w-full flex items-center justify-center gap-3 bg-white border-4 border-black shadow-brutal-sm py-3.5 font-bold text-base hover:shadow-brutal-hover hover:translate-x-[2px] hover:translate-y-[2px] transition-all rounded-full">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/></svg>
                        Sign up with Apple
                    </button>
                </div>
            </div>

            <!-- Login link -->
            <p class="text-center mt-6 font-semibold text-gray-500">
                Already have an account? <a href="login.html" class="text-brand-blue font-black underline decoration-4 underline-offset-2 hover:text-black transition-colors">Log in</a>
            </p>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- SIMPLE FOOTER                              -->
    <!-- ========================================== -->
    <footer class="bg-black py-6 text-white">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4">
            <p class="font-bold text-gray-500 text-sm">© 2026 Linkto Inc.</p>
            <div class="flex gap-6 text-sm font-bold text-gray-500">
                <a href="about.html" class="hover:text-white transition-colors">About</a>
                <a href="blog.html" class="hover:text-white transition-colors">Blog</a>
                <a href="community.html" class="hover:text-white transition-colors">Community</a>
                <a href="cookie.html" class="hover:text-white transition-colors">Cookie</a>
            </div>
        </div>
    </footer>

    <script>
        // Simple password strength indicator
        const passwordInput = document.getElementById('password');
        const bars = [document.getElementById('str-1'), document.getElementById('str-2'), document.getElementById('str-3')];

        passwordInput.addEventListener('input', function() {
            const val = this.value;
            let strength = 0;
            
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
            if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) strength++;

            bars.forEach((bar, i) => {
                bar.className = 'h-2 flex-1 rounded-full ';
                if (i < strength) {
                    if (strength === 1) bar.classList.add('strength-weak');
                    else if (strength === 2) bar.classList.add('strength-medium');
                    else bar.classList.add('strength-strong');
                } else {
                    bar.classList.add('bg-gray-200');
                }
            });
        });
    </script>
</body>
</html>
