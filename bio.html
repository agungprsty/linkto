<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comedy Central | Linktree</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#B4B4B4',      /* Desktop outer background */
                            card: '#F9F9F9',    /* Inner card background */
                            text: '#000000',
                            linkBg: '#FFFFFF',
                            purple: '#7960F1',  /* Floating icon purple */
                            gold: '#DDA835'     /* Verified badge gold */
                        }
                    },
                    boxShadow: {
                        'link': '0 2px 8px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.02)',
                        'float': '0 4px 12px rgba(121, 96, 241, 0.4)',
                        'join': '0 8px 24px rgba(0, 0, 0, 0.08)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #B4B4B4; /* Gray background for desktop view */
        }
        
        /* Subtle Noise/Grain Texture for the main card */
        .bg-noise {
            background-color: #FAFAFA;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* Hover animation for links */
        .link-card {
            transition: transform 0.15s cubic-bezier(0, 0, 0.2, 1);
        }
        .link-card:hover {
            transform: scale(1.02);
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-start sm:py-10">

    <!-- Main Container (Mobile full width, Desktop rounded card) -->
    <main class="w-full sm:max-w-[480px] bg-noise min-h-screen sm:min-h-0 sm:rounded-[40px] shadow-2xl relative overflow-hidden flex flex-col items-center pb-8">
        
        <!-- Header: Top Navigation -->
        <header class="w-full flex justify-between items-center px-5 py-4">
            <!-- Left Logo/Icon (Starburst) -->
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0L13.5 8.5L22 10L14.5 13.5L16 22L12 16L8 22L9.5 13.5L2 10L10.5 8.5L12 0Z" />
                </svg>
            </button>

            <!-- Right Actions -->
            <div class="flex items-center gap-3">
                <button class="text-[13px] font-semibold text-black bg-black/5 hover:bg-black/10 px-4 py-2 rounded-full transition-colors">
                    Subscribe
                </button>
                <button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/5 hover:bg-black/10 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                        <polyline points="16 6 12 2 8 6"></polyline>
                        <line x1="12" y1="2" x2="12" y2="15"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Profile Section -->
        <div class="flex flex-col items-center mt-2 mb-6 px-4">
            <!-- Avatar with Verified Badge -->
            <div class="relative">
                <!-- Grey Avatar Circle -->
                <div class="w-[96px] h-[96px] rounded-full bg-[#B1B1B1] overflow-hidden flex items-end justify-center">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full transform translate-y-2">
                        <!-- Shoulders -->
                        <path d="M15 100C15 65 30 55 50 55C70 55 85 65 85 100" fill="#EAEAEA"/>
                        <!-- Head -->
                        <circle cx="50" cy="35" r="20" fill="#EAEAEA"/>
                    </svg>
                </div>
                <!-- Verified Checkmark -->
                <div class="absolute bottom-0 right-0 w-6 h-6 bg-brand-gold rounded-full border-2 border-[#F9F9F9] flex items-center justify-center z-10">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>
            
            <!-- Profile Name -->
            <h1 class="text-[22px] font-bold text-black mt-4 tracking-tight">Comedy Central</h1>
        </div>

        <!-- Links Section -->
        <div class="w-full px-4 space-y-3 relative">
            
            <!-- Link 1: Paramount+ -->
            <a href="#" class="link-card w-full bg-white rounded-[28px] p-2 pr-4 flex items-center min-h-[64px] shadow-link group">
                <div class="w-12 h-12 rounded-xl bg-[#0064FF] flex-shrink-0 flex items-center justify-center overflow-hidden">
                    <!-- Paramount Logo Mock -->
                    <svg viewBox="0 0 40 40" fill="white" class="w-8 h-8">
                        <path d="M20 10L10 25H30L20 10Z"/><circle cx="20" cy="20" r="18" stroke="white" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
                    </svg>
                </div>
                <div class="flex-1 text-center px-2">
                    <span class="font-semibold text-[14px] text-black leading-tight">Stream Comedy Central Shows on Paramount+</span>
                </div>
                <div class="w-6 flex justify-end text-gray-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                </div>
            </a>

            <!-- Link 2: Tales From The Trip Merch -->
            <a href="#" class="link-card w-full bg-white rounded-[28px] p-2 pr-4 flex items-center min-h-[64px] shadow-link group">
                <div class="w-12 h-12 rounded-xl bg-[#1A1A24] flex-shrink-0 flex items-center justify-center overflow-hidden relative">
                    <!-- Colorful abstract mock -->
                    <div class="absolute inset-0 bg-gradient-to-tr from-purple-500 via-pink-500 to-yellow-500 opacity-60 rounded-full blur-[4px] transform scale-50"></div>
                </div>
                <div class="flex-1 text-center px-2">
                    <span class="font-semibold text-[14px] text-black leading-tight">Tales From The Trip Merch</span>
                </div>
                <div class="w-6 flex justify-end text-gray-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                </div>
            </a>

            <!-- Link 3: Comedy Central Merch Store (Has Floating Icon) -->
            <div class="relative w-full">
                <a href="#" class="link-card w-full bg-white rounded-[28px] p-2 pr-4 flex items-center min-h-[64px] shadow-link group">
                    <div class="w-12 h-12 rounded-xl bg-black flex-shrink-0 flex items-center justify-center">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#FFCC00" stroke-width="4" class="w-6 h-6"><circle cx="12" cy="12" r="10"/><path d="M16 8A6 6 0 1 0 16 16"/></svg>
                    </div>
                    <div class="flex-1 text-center px-2">
                        <span class="font-semibold text-[14px] text-black leading-tight">Comedy Central Merch Store</span>
                    </div>
                    <div class="w-6 flex justify-end text-gray-300">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                    </div>
                </a>
            </div>

            <!-- Link 4: Comedy Central YouTube -->
            <a href="#" class="link-card w-full bg-white rounded-[28px] p-2 pr-4 flex items-center min-h-[64px] shadow-link group">
                <div class="w-12 h-12 rounded-xl bg-white border border-gray-100 flex-shrink-0 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="#FF0000" class="w-8 h-8"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </div>
                <div class="flex-1 text-center px-2">
                    <span class="font-semibold text-[14px] text-black leading-tight">Comedy Central YouTube</span>
                </div>
                <div class="w-6 flex justify-end text-gray-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                </div>
            </a>

            <!-- Link 5: Animated YouTube -->
            <a href="#" class="link-card w-full bg-white rounded-[28px] p-2 pr-4 flex items-center min-h-[64px] shadow-link group">
                <div class="w-12 h-12 rounded-xl bg-white border border-gray-100 flex-shrink-0 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#C9A86A" stroke-width="4" class="w-7 h-7" style="filter: drop-shadow(1px 1px 0px black);"><circle cx="12" cy="12" r="10"/><path d="M16 8A6 6 0 1 0 16 16"/></svg>
                </div>
                <div class="flex-1 text-center px-2">
                    <span class="font-semibold text-[14px] text-black leading-tight">Animated YouTube</span>
                </div>
                <div class="w-6 flex justify-end text-gray-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                </div>
            </a>

            <!-- Link 6: Stand-Up YouTube -->
            <a href="#" class="link-card w-full bg-white rounded-[28px] p-2 pr-4 flex items-center min-h-[64px] shadow-link group">
                <div class="w-12 h-12 rounded-xl bg-black flex-shrink-0 flex items-center justify-center px-1">
                    <span class="text-white font-black text-[9px] leading-tight text-center">STAND-<br>UP</span>
                </div>
                <div class="flex-1 text-center px-2">
                    <span class="font-semibold text-[14px] text-black leading-tight">Stand-Up YouTube</span>
                </div>
                <div class="w-6 flex justify-end text-gray-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                </div>
            </a>

            <!-- Link 7: cc.com -->
            <a href="#" class="link-card w-full bg-white rounded-[28px] p-2 pr-4 flex items-center min-h-[64px] shadow-link group mb-8">
                <div class="w-12 h-12 rounded-xl bg-black flex-shrink-0 flex items-center justify-center">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#FFCC00" stroke-width="4" class="w-6 h-6"><circle cx="12" cy="12" r="10"/><path d="M16 8A6 6 0 1 0 16 16"/></svg>
                </div>
                <div class="flex-1 text-center px-2">
                    <span class="font-semibold text-[14px] text-black leading-tight">cc.com</span>
                </div>
                <div class="w-6 flex justify-end text-gray-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                </div>
            </a>
        </div>

        <!-- Social Icons (Pixel-perfect matches) -->
        <div class="flex items-center justify-center gap-6 mt-8 mb-20">
            <!-- Facebook -->
            <a href="#" class="text-black hover:scale-110 transition-transform">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>

            </a>
            <!-- TikTok -->
            <a href="#" class="text-black hover:scale-110 transition-transform">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 2.78-1.15 5.54-3.33 7.65-2.22 2.14-5.08 3.24-8.15 3.12-3.14-.13-6.13-1.6-8.17-4.11-2.02-2.48-2.91-5.75-2.52-8.91.4-3.18 2.05-6.09 4.56-8.08 2.47-1.94 5.6-2.73 8.7-2.31v4.21c-2.2-.2-4.48.24-6.31 1.49-1.87 1.29-3.08 3.33-3.31 5.59-.22 2.19.46 4.43 1.95 6.06 1.44 1.57 3.51 2.42 5.68 2.37 2.15-.05 4.19-1.04 5.56-2.65 1.35-1.57 2.1-3.61 2.05-5.71-.04-4.88-.02-9.76-.02-14.64z"/></svg>

            <a href="#" class="text-black hover:scale-110 transition-transform">

            <a href="#" class="text-black hover:scale-110 transition-transform">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

            <!-- Bottom Tiny Links -->
